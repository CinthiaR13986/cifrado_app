<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f9;
    }

    .navbar {
        background: #667eea;
        color: white;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .navbar h2 {
        margin: 0;
        font-size: 18px;
    }

    .navbar a {
        color: white;
        text-decoration: none;
        margin-left: 15px;
        font-size: 14px;
    }

    .navbar a:hover {
        text-decoration: underline;
    }

    .container {
        max-width: 600px;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
        resize: none;
        outline: none;
        transition: 0.3s;
        font-size: 14px;
    }

    textarea:focus {
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102,126,234,0.4);
    }

    button {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    button:hover {
        background: #5a67d8;
    }

    .actions {
        margin-top: 20px;
        text-align: center;
    }

    .actions a {
        display: inline-block;
        margin: 5px 10px;
        color: #667eea;
        text-decoration: none;
        font-weight: bold;
    }

    .actions a:hover {
        text-decoration: underline;
    }
</style>

</head>
<body>

<div class="navbar">
    <h2>Bienvenido {{ session['user_name'] }}</h2>
    <div>
        <a href="/historial">Historial</a>
        <a href="/logout">Cerrar sesión</a>
    </div>
</div>

<div class="container">
    <form method="POST">
        <textarea name="texto" placeholder="Ingrese el texto" required></textarea>
        <button type="submit">Cifrar</button>
    </form>

    <div class="actions">
        <a href="/historial">Ver Historial</a>
    </div>
</div>

</body>
</html>
