<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Token Generado</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 400px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .card h3 {
        margin-bottom: 15px;
        color: #333;
    }

    .token-box {
        background: #eef1ff;
        border: 1px dashed #667eea;
        padding: 15px;
        border-radius: 5px;
        font-family: monospace;
        word-break: break-all;
        margin-bottom: 20px;
        color: #333;
    }

    .btn {
        display: inline-block;
        padding: 10px 20px;
        background: #667eea;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: 0.3s;
    }

    .btn:hover {
        background: #5a67d8;
    }
</style>

</head>
<body>

<div class="card">
    <h3>Token generado</h3>

    <div class="token-box">
        {{ token }}
    </div>

    <a href="/dashboard" class="btn">Volver al Dashboard</a>
</div>

</body>
</html>
